name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync (with dev extra)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run python -m unittest discover -s tests -v

      - name: Smoke-test the analysis pipeline on synthetic data
        run: |
          uv run garmin-health-etl generate-sample --output-dir /tmp/sample --days 90
          uv run garmin-health-etl import-json --input /tmp/sample/sample_garmin.json --db /tmp/ci.db --source sample
          uv run garmin-health-etl import-tracker --input /tmp/sample/sample_tracker.csv --db /tmp/ci.db
          uv run garmin-health-etl analyze --db /tmp/ci.db --output /tmp/report.md --charts-dir /tmp/charts
